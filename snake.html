<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serpent</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e0ff;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, #a78bfa, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #hud {
      display: flex;
      gap: 3rem;
      margin-bottom: 1.2rem;
    }

    .stat {
      text-align: center;
    }

    .stat-label {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #6b7280;
    }

    .stat-value {
      font-size: 1.6rem;
      font-weight: 700;
      color: #a78bfa;
    }

    #canvas-wrapper {
      position: relative;
      border-radius: 16px;
      padding: 4px;
      background: linear-gradient(135deg, #a78bfa, #38bdf8, #34d399);
      box-shadow: 0 0 60px rgba(167, 139, 250, 0.3);
    }

    canvas {
      display: block;
      border-radius: 12px;
      background: #12122a;
    }

    #overlay {
      position: absolute;
      inset: 4px;
      border-radius: 12px;
      background: rgba(15, 15, 26, 0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      backdrop-filter: blur(4px);
    }

    #overlay h2 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #overlay p {
      color: #9ca3af;
      font-size: 0.95rem;
      text-align: center;
      line-height: 1.6;
    }

    #overlay .final-score {
      font-size: 3rem;
      font-weight: 900;
      color: #34d399;
    }

    button {
      margin-top: 0.5rem;
      padding: 0.75rem 2.5rem;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #a78bfa, #38bdf8);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(167, 139, 250, 0.4);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(167, 139, 250, 0.55);
    }

    button:active {
      transform: translateY(0);
    }

    #controls {
      margin-top: 1.2rem;
      display: flex;
      gap: 2rem;
      color: #4b5563;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
    }

    #controls span {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    kbd {
      background: #1e1e3a;
      border: 1px solid #374151;
      border-radius: 5px;
      padding: 2px 7px;
      font-size: 0.75rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>

  <h1>SERPENT</h1>

  <div id="hud">
    <div class="stat">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="score">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Meilleur</div>
      <div class="stat-value" id="best">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Niveau</div>
      <div class="stat-value" id="level">1</div>
    </div>
  </div>

  <div id="canvas-wrapper">
    <canvas id="canvas" width="420" height="420"></canvas>
    <div id="overlay">
      <h2>SERPENT</h2>
      <p>Mange les pommes, évite les murs<br>et ne te mords pas la queue !</p>
      <button id="btn">Jouer</button>
      <p style="font-size:0.8rem; color:#4b5563;">Flèches ou WASD pour diriger · Espace pour pause</p>
    </div>
  </div>

  <div id="controls">
    <span><kbd>↑ ↓ ← →</kbd> Diriger</span>
    <span><kbd>Espace</kbd> Pause</span>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const btn = document.getElementById('btn');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const levelEl = document.getElementById('level');

    const CELL = 20;
    const COLS = canvas.width / CELL;   // 21
    const ROWS = canvas.height / CELL;  // 21

    // Palette
    const COLORS = {
      snakeHead: '#a78bfa',
      snakeBody: '#7c3aed',
      snakeOutline: '#c4b5fd',
      food: '#f43f5e',
      foodGlow: 'rgba(244,63,94,0.4)',
      bonus: '#fbbf24',
      bonusGlow: 'rgba(251,191,36,0.4)',
      grid: 'rgba(255,255,255,0.025)',
      eye: '#ffffff',
    };

    let snake, dir, nextDir, food, bonus, score, best, level, speed, loop, paused, alive, bonusTimer;
    best = parseInt(localStorage.getItem('snake_best') || '0');
    bestEl.textContent = best;

    function init() {
      snake = [
        { x: 10, y: 10 },
        { x: 9,  y: 10 },
        { x: 8,  y: 10 },
      ];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      level = 1;
      speed = 130;
      paused = false;
      alive = true;
      bonus = null;
      bonusTimer = 0;
      scoreEl.textContent = 0;
      levelEl.textContent = 1;
      placeFood();
      clearInterval(loop);
      loop = setInterval(tick, speed);
    }

    function placeFood() {
      food = randomEmpty();
    }

    function randomEmpty() {
      let pos;
      do {
        pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y) || (bonus && bonus.x === pos.x && bonus.y === pos.y));
      return pos;
    }

    function tick() {
      if (paused || !alive) return;

      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // Mur
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        gameOver(); return;
      }
      // Soi-même
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        gameOver(); return;
      }

      snake.unshift(head);

      let ate = false;
      if (head.x === food.x && head.y === food.y) {
        ate = true;
        score += 10 * level;
        scoreEl.textContent = score;
        if (score > best) { best = score; bestEl.textContent = best; localStorage.setItem('snake_best', best); }
        placeFood();
        // Bonus toutes les 5 pommes
        if (snake.length % 5 === 0) spawnBonus();
        // Niveau tous les 50 pts
        const newLevel = Math.floor(score / 50) + 1;
        if (newLevel !== level) {
          level = newLevel;
          levelEl.textContent = level;
          clearInterval(loop);
          speed = Math.max(55, 130 - (level - 1) * 12);
          loop = setInterval(tick, speed);
        }
      }

      if (bonus && head.x === bonus.x && head.y === bonus.y) {
        ate = true;
        score += 30 * level;
        scoreEl.textContent = score;
        if (score > best) { best = score; bestEl.textContent = best; localStorage.setItem('snake_best', best); }
        bonus = null;
      }

      if (!ate) snake.pop();

      if (bonus) {
        bonusTimer--;
        if (bonusTimer <= 0) bonus = null;
      }

      draw();
    }

    function spawnBonus() {
      bonus = randomEmpty();
      bonusTimer = 40;
    }

    function gameOver() {
      alive = false;
      clearInterval(loop);
      draw();
      setTimeout(() => showOverlay('game-over'), 300);
    }

    // ─── Drawing ──────────────────────────────────────────────────────────────

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawGrid();
      drawFood();
      if (bonus) drawBonus();
      drawSnake();
    }

    function drawGrid() {
      ctx.strokeStyle = COLORS.grid;
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath();
        ctx.moveTo(x * CELL, 0);
        ctx.lineTo(x * CELL, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * CELL);
        ctx.lineTo(canvas.width, y * CELL);
        ctx.stroke();
      }
    }

    function drawFood() {
      const cx = food.x * CELL + CELL / 2;
      const cy = food.y * CELL + CELL / 2;
      // Glow
      const g = ctx.createRadialGradient(cx, cy, 2, cx, cy, CELL);
      g.addColorStop(0, COLORS.foodGlow);
      g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.fillRect(food.x * CELL - CELL, food.y * CELL - CELL, CELL * 3, CELL * 3);
      // Circle
      ctx.beginPath();
      ctx.arc(cx, cy, CELL / 2 - 2, 0, Math.PI * 2);
      ctx.fillStyle = COLORS.food;
      ctx.fill();
      // Shine
      ctx.beginPath();
      ctx.arc(cx - 3, cy - 3, 3, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fill();
    }

    function drawBonus() {
      const cx = bonus.x * CELL + CELL / 2;
      const cy = bonus.y * CELL + CELL / 2;
      // Pulse opacity
      const alpha = 0.5 + 0.5 * Math.sin(Date.now() / 150);
      // Glow
      const g = ctx.createRadialGradient(cx, cy, 2, cx, cy, CELL);
      g.addColorStop(0, `rgba(251,191,36,${alpha * 0.5})`);
      g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.fillRect(bonus.x * CELL - CELL, bonus.y * CELL - CELL, CELL * 3, CELL * 3);
      // Star shape (simple pentagon)
      drawStar(cx, cy, 5, CELL / 2 - 1, CELL / 4, COLORS.bonus);
    }

    function drawStar(cx, cy, points, outer, inner, color) {
      ctx.beginPath();
      for (let i = 0; i < points * 2; i++) {
        const r = i % 2 === 0 ? outer : inner;
        const angle = (i / (points * 2)) * Math.PI * 2 - Math.PI / 2;
        i === 0 ? ctx.moveTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle))
                : ctx.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
      }
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
    }

    function drawSnake() {
      snake.forEach((seg, i) => {
        const x = seg.x * CELL;
        const y = seg.y * CELL;
        const pad = 1;
        const r = i === 0 ? 7 : 5;

        if (i === 0) {
          // Tête avec dégradé
          const g = ctx.createLinearGradient(x, y, x + CELL, y + CELL);
          g.addColorStop(0, COLORS.snakeHead);
          g.addColorStop(1, '#c4b5fd');
          ctx.fillStyle = g;
        } else {
          // Corps avec dégradé progressif
          const t = i / snake.length;
          ctx.fillStyle = lerpColor('#7c3aed', '#1e1b4b', t);
        }

        roundRect(ctx, x + pad, y + pad, CELL - pad * 2, CELL - pad * 2, r);
        ctx.fill();

        // Contour léger sur la tête
        if (i === 0) {
          ctx.strokeStyle = COLORS.snakeOutline;
          ctx.lineWidth = 1.5;
          roundRect(ctx, x + pad, y + pad, CELL - pad * 2, CELL - pad * 2, r);
          ctx.stroke();

          // Yeux
          drawEyes(seg);
        }
      });
    }

    function drawEyes(head) {
      const cx = head.x * CELL + CELL / 2;
      const cy = head.y * CELL + CELL / 2;
      // Offsets selon direction
      const ox = dir.y !== 0 ? 4 : 0;
      const oy = dir.x !== 0 ? 4 : 0;
      const ex = dir.x !== 0 ? dir.x * 3 : 0;
      const ey = dir.y !== 0 ? dir.y * 3 : 0;

      [[-1, -1], [1, -1]].forEach(([sx, sy]) => {
        const eyeX = cx + ex + sx * (ox || 3);
        const eyeY = cy + ey + sy * (oy || 3);
        ctx.beginPath();
        ctx.arc(eyeX, eyeY, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = COLORS.eye;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(eyeX + dir.x * 0.8, eyeY + dir.y * 0.8, 1.2, 0, Math.PI * 2);
        ctx.fillStyle = '#0f0f1a';
        ctx.fill();
      });
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function lerpColor(a, b, t) {
      const ah = parseInt(a.replace('#',''), 16);
      const bh = parseInt(b.replace('#',''), 16);
      const ar = (ah >> 16) & 0xff, ag = (ah >> 8) & 0xff, ab = ah & 0xff;
      const br = (bh >> 16) & 0xff, bg = (bh >> 8) & 0xff, bb = bh & 0xff;
      const rr = Math.round(ar + (br - ar) * t);
      const rg = Math.round(ag + (bg - ag) * t);
      const rb = Math.round(ab + (bb - ab) * t);
      return `rgb(${rr},${rg},${rb})`;
    }

    // ─── Overlay ──────────────────────────────────────────────────────────────

    function showOverlay(mode) {
      overlay.innerHTML = '';
      overlay.style.display = 'flex';

      if (mode === 'game-over') {
        const h2 = document.createElement('h2');
        h2.textContent = 'GAME OVER';
        h2.style.color = '#f43f5e';
        h2.style.webkitTextFillColor = '#f43f5e';

        const fs = document.createElement('div');
        fs.className = 'final-score';
        fs.textContent = score;

        const p = document.createElement('p');
        p.textContent = score >= best ? '🏆 Nouveau record !' : `Record : ${best}`;

        const b = document.createElement('button');
        b.textContent = 'Rejouer';
        b.onclick = startGame;

        overlay.append(h2, fs, p, b);
      } else {
        const h2 = document.createElement('h2');
        h2.textContent = 'SERPENT';

        const p = document.createElement('p');
        p.innerHTML = 'Mange les pommes <span style="color:#f43f5e">●</span>, évite les murs<br>et ne te mords pas la queue !<br><br><span style="color:#fbbf24">★</span> Bonus : +30 pts × niveau';

        const b = document.createElement('button');
        b.textContent = 'Jouer';
        b.onclick = startGame;
        b.id = 'btn';

        const hint = document.createElement('p');
        hint.style.fontSize = '0.8rem';
        hint.style.color = '#4b5563';
        hint.textContent = 'Flèches ou WASD · Espace pour pause';

        overlay.append(h2, p, b, hint);
      }
    }

    function startGame() {
      overlay.style.display = 'none';
      init();
      draw();
    }

    // ─── Input ────────────────────────────────────────────────────────────────

    document.addEventListener('keydown', e => {
      switch (e.key) {
        case 'ArrowUp':    case 'w': case 'W': if (dir.y !== 1)  nextDir = {x:0, y:-1}; break;
        case 'ArrowDown':  case 's': case 'S': if (dir.y !== -1) nextDir = {x:0, y:1};  break;
        case 'ArrowLeft':  case 'a': case 'A': if (dir.x !== 1)  nextDir = {x:-1,y:0};  break;
        case 'ArrowRight': case 'd': case 'D': if (dir.x !== -1) nextDir = {x:1, y:0};  break;
        case ' ':
          if (!alive) return;
          paused = !paused;
          if (paused) {
            overlay.innerHTML = '<h2 style="background:linear-gradient(135deg,#a78bfa,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent">PAUSE</h2><p style="color:#9ca3af">Appuie sur Espace pour continuer</p>';
            overlay.style.display = 'flex';
          } else {
            overlay.style.display = 'none';
          }
          break;
      }
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
    });

    // ─── Boot ─────────────────────────────────────────────────────────────────

    showOverlay('start');
  </script>
</body>
</html>
